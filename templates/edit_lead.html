{% extends "base.html" %}
{% block content %}
<h3>Edit Lead</h3>
<form method="post">
  <div class="row g-3">
    <input type="hidden" name="next" value="{{ next_page }}">
    <div class="col-md-6"><label class="form-label">Name</label><input name="name" class="form-control" value="{{ lead['name'] }}" required></div>
    <div class="col-md-6"><label class="form-label">Email</label><input name="email" class="form-control" value="{{ lead['email'] }}"></div>
    <div class="col-md-6"><label class="form-label">Phone</label><input name="phone" class="form-control" value="{{ lead['phone'] }}"></div>
    <div class="col-md-6">
     <label class="form-label">Date of Birth</label>
     <input type="date" name="dob" class="form-control" value="{{ lead.dob }}">
    </div>
    <div class="form-group">
        <label for="partner">Assign Channel Partner</label>
        <select name="partner_id" id="partner" class="form-control">
            <option value="">-- None --</option>
            {% for partner in partners %}
            <option value="{{ partner.id }}" {% if lead.partner_id == partner.id %}selected{% endif %}>{{ partner.company }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="university">University</label>
        <select name="university" class="form-control">
            <option value="">-- Select University --</option>
            {% for uni in universities %}
            <option value="{{ uni }}" {% if lead and lead.university == uni %}selected{% endif %}>{{ uni }}</option>
            {% endfor %}
        </select>
    </div>

<script>
let timeout = null;
const leadId = "{{ lead.id }}";

function collectFormData() {
    return {
        name: document.querySelector("[name=name]").value,
        email: document.querySelector("[name=email]").value,
        phone: document.querySelector("[name=phone]").value,
        dob: document.querySelector("[name=dob]").value,
        stage: document.querySelector("[name=stage]").value,
        notes: document.querySelector("[name=notes]").value,
        university: document.querySelector("[name=university]").value,
        partner_id: document.querySelector("[name=partner_id]").value
    };
}

let lastSavedData = JSON.stringify(collectFormData());

document.querySelectorAll("input, textarea, select").forEach(field => {

    field.addEventListener("change", triggerAutoSave);

    field.addEventListener("keyup", () => {
        clearTimeout(timeout);

        timeout = setTimeout(() => {
            triggerAutoSave();
        }, 5000); // save after 5 sec idle typing
    });

});

function triggerAutoSave() {

    const currentData = JSON.stringify(collectFormData());

    // Prevent unnecessary saves
    if (currentData === lastSavedData) {
        return;
    }

    fetch(`/update-draft/${leadId}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: currentData
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("Autosave failed");
        }
        return response.json();
    })
    .then(data => {
        lastSavedData = currentData;
        console.log("Auto-saved successfully");
    })
    .catch(error => {
        console.error("Autosave error:", error);
    });
}
</script>


    <div class="col-md-6"><label class="form-label">Stage</label>
      <select name="stage" class="form-select">
        {% for key,label in [('new','New'),('contacted','Contacted'),('assessment','Assessment'),('gs','GS'),('on-hold','On-hold'),('case-dropped','Case Dropped'),('offer','Offer'),('ucol', 'UCOL'),('coe','COE'),('visa-lodged','Visa Lodged'),('visa-grant','Visa Grant'),('visa-refused','Visa Refused')] %}
          <option value="{{ key }}" {% if lead['stage']==key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select></div>
    <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" rows="3" class="form-control">{{ lead['notes'] }}</textarea></div>
  </div>
  <button class="btn btn-primary mt-3">Update</button>
  <a href="{{ url_for('leads') }}" class="btn btn-secondary mt-3">Cancel</a>
</form>
{% endblock %}
