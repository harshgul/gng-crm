<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GNG CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    .sticky-search {
        position: sticky;
        top: 70px;  /* height of navbar */
        z-index: 1020; /* higher than table */
    }

</style>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">

        <!-- Brand -->
        <a class="navbar-brand" href="#">GNG CRM</a>

        <!-- Hamburger Button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('leads') }}">Leads</a>
                </li>
                
                <li class="nav-item">
                      <a class="nav-link" href="{{ url_for('partners') }}">Partners</a>
                </li>
              
                <li class="nav-item">
                      <a class="nav-link" href="{{ url_for('import_leads') }}">Import Leads</a>

                <li class="nav-item">
                  <a class="nav-link" href="{{ url_for('team') }}">Our Team</a>

               
                 <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                </li>

            </ul>
        </div>

    </div>
</nav>



<div class="container pt-5 mt-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="alert-container mb-6">
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm p-3 mb-3 rounded" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
</div>
   





  <div class="container" style="margin-top: 100px;">
                  {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
