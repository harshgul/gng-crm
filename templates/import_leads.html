{% extends "base.html" %}
{% block content %}
<h3>Import Leads from Excel</h3>
<p class="text-muted">Required columns: <code>name, email, phone, stage</code>. Optional: <code>notes</code>.</p>
<form method="post" enctype="multipart/form-data">
  <input type="file" name="file" class="form-control mb-3" accept=".xlsx,.xls" required>
  <button class="btn btn-primary">Upload & Import</button>
  <a href="{{ url_for('leads') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
